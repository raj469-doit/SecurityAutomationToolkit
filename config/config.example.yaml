# config.example.yaml
# Copy to config/config.yaml and adjust as needed.
# All values here match the scanner's built-in defaults.

scan_settings:
  default_timeout: 10
  user_agent: "SecurityAutomationToolkit/1.0"
  allow_redirects: true

# Point deductions for each finding type.
# The scanner starts at 100 and subtracts these values.
severity_weights:
  no_https: 25

  # Per missing header (high-risk)
  Strict-Transport-Security: 15
  Content-Security-Policy: 15

  # Per missing header (medium-risk)
  X-Frame-Options: 10
  X-Content-Type-Options: 10

  # Per missing header (low-risk, OWASP recommended)
  Referrer-Policy: 5
  Permissions-Policy: 5
  X-Permitted-Cross-Domain-Policies: 5

  # Per insecure cookie flag
  cookie_missing_secure: 20
  cookie_missing_httponly: 10

  # Server version disclosure (OWASP A06)
  server_version_disclosure: 10
