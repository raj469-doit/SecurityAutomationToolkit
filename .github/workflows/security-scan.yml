# ==============================================================================
# GitHub Actions Workflow: Automated Security QA & Vulnerability Assessment
# Purpose: Automatically runs OWASP-aligned web security scans on code changes.
# ==============================================================================

name: Security Automation Scan

# Define the operational triggers for the automation pipeline
on:
  push:
    branches: [ "main", "master" ]       # Triggers execution on direct merges or commits to production branches
  pull_request:
    branches: [ "main", "master" ]       # Triggers validation checks before code can be merged into production
  schedule:
    - cron: '0 0 * * 1'                  # Scheduled execution: Runs every Monday at midnight UTC to check for regression
  workflow_dispatch:                     # Allows QA engineers and security auditors to trigger the scan manually via UI

# Enforce strict principle of least privilege permissions at the workflow level
permissions:
  contents: read                         # Explicitly grant read-only access to prevent unauthorized repository tampering

jobs:
  security-assessment:
    name: Execute Security Testing Suite
    runs-on: ubuntu-latest               # Utilizes a clean, standard Linux environment for testing consistency

    steps:
      # Step 1: Check out the repository source code so files are accessible to the runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Provision a reliable and isolated Python runtime environment
      - name: Set Up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'         # Locks the environment version to ensure syntax and engine stability
          cache: 'pip'                   # Automatically caches pip dependencies to optimize step execution time

      # Step 3: Install core dependencies from requirements.txt
      # (Ensures libraries like pytest, requests, and beautifulsoup4 are present)
      - name: Install Framework Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Validate the system locally using mock tests before hitting live networks
      # This ensures any changes to security_score.py haven't broken the internal logic.
      - name: Run Local Unit & Mock Security Checks
        run: |
          python -m pytest tests/ --verbose

      # Step 5: Execute the production command-line application against designated targets
      # Consolidates execution logic into security_score.py using Python native target execution.
      - name: Execute Live Security Assessment
        env:
          # Protect target URLs by injecting them safely via GitHub Secrets rather than hardcoding
          TARGET_URL: ${{ secrets.SECURITY_SCAN_TARGET_URL }}
        run: |
          # Fallback default target if a secret isn't configured, though production should rely on the secret
          URL=${TARGET_URL:-"https://example.com"}
          echo "Initiating OWASP-aligned security posture check against: $URL"
          python security_score.py --url "$URL"

      # Step 6: Generate structured, shareable reports (e.g., markdown or HTML formats)
      - name: Compile Findings Report
        if: always()                       # Ensures compliance metrics are compiled even if standard test assert rules fail
        run: |
          python generate_report.py

      # Step 7: Preserve and isolate test results as downloadable build artifacts
      - name: Archive Assessment Artifacts
        uses: actions/upload-artifact@v4
        if: always()                       # Always make reports available for audit review
        with:
          name: security-scan-report
          path: |
            reports/
            *.html
            *.md
          retention-days: 30             # Retention configuration to clean up old files and manage runner storage spaces
