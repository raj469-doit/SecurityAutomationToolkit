name: Security Automation Infrastructure Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to perform OWASP validation against'
        required: true
        type: string
        default: 'https://sandbox.yourdomain.internal'

jobs:
  evaluate-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Configure Production Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Architecture Requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ensure Output Directories Exist
        run: |
          # Prevents script level FileNotFoundError during local storage operations
          mkdir -p reports/

      - name: Run Offline Core Test Stubs
        run: python -m pytest tests/ -v

      - name: Perform Scan Execution Pipeline
        run: |
          # Executes your primary security validation logic using inputs safely
          python security_score.py --url "${{ github.event.inputs.target_url }}" --output reports/production_run.html

      - name: Archive Assessment Metrics Artifacts
        if: always() # Ensures reports and logs are preserved even if standard steps fail
        uses: actions/upload-artifact@v4
        with:
          name: security-compliance-report
          path: reports/
          retention-days: 14
