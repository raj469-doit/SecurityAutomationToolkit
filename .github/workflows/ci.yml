name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (required for the scan job)"
        required: false
        default: ""

jobs:
  # ── 1. Lint ────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy security_score.py generate_report.py

  # ── 2. Test ────────────────────────────────────────────────
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --junitxml=junit/test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit/test-results.xml

  # ── 3. Live scan ───────────────────────────────────────────
  scan:
    name: Live security scan
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Run security scan
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://example.com' }}
        run: python security_score.py --url "$TARGET_URL" --output-dir outputs/

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: outputs/
